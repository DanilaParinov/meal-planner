<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner - Подбор меню по калориям</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍽️ Meal Planner</h1>
            <p>Подбор наборов блюд по калорийному лимиту</p>
        </header>

        <div class="auth-section" id="authSection">
            <div class="auth-box">
                <h2>Вход</h2>
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="Введи API ключ"
                    class="input"
                >
                <button onclick="login()" class="btn btn-primary">Войти</button>
                <p class="info-text">Тестовые ключи: test-user-abc123xyz, test-user-def456uvw</p>
            </div>
        </div>

        <div class="app-section" id="appSection" style="display: none;">
            <div class="user-info">
                <p id="userInfo"></p>
                <button onclick="logout()" class="btn btn-secondary">Выход</button>
            </div>

            <div class="main-content">
                <!-- Left column: search -->
                <aside class="sidebar">
                    <h2>Параметры поиска</h2>

                    <div class="form-group">
                        <label for="restaurant">Ресторан:</label>
                        <select id="restaurant" class="input">
                            <option value="">-- Выбери ресторан --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="calories">Максимум калорий:</label>
                        <div class="slider-row">
                            <input
                                type="range"
                                id="caloriesSlider"
                                min="100"
                                max="5000"
                                step="50"
                                value="600"
                                class="slider"
                            >
                            <input
                                type="number"
                                id="calories"
                                min="100"
                                max="5000"
                                value="600"
                                class="input input-narrow"
                            >
                        </div>
                        <p class="slider-label" id="caloriesLabel">600 ккал</p>
                    </div>

                    <div class="form-group">
                        <label for="weight">Максимум масса:</label>
                        <div class="slider-row">
                            <input
                                type="range"
                                id="weightSlider"
                                min="100"
                                max="2000"
                                step="50"
                                value="400"
                                class="slider"
                            >
                            <input
                                type="number"
                                id="weight"
                                min="100"
                                max="2000"
                                value="400"
                                class="input input-narrow"
                            >
                        </div>
                        <p class="slider-label" id="weightLabel">400 г</p>
                    </div>

                    <div class="form-group form-group-inline">
                        <label class="toggle-label">
                            <input type="checkbox" id="includeDrinks" class="toggle-checkbox">
                            <span class="toggle-track"><span class="toggle-thumb"></span></span>
                            Включать напитки
                        </label>
                    </div>

                    <button onclick="searchMeals()" class="btn btn-primary btn-block">
                        Найти комбинации
                    </button>

                    <hr>

                    <h2>История</h2>
                    <div id="history" class="history-list"></div>
                </aside>

                <!-- Right column: results -->
                <main class="content">
                    <div id="loading" class="loading" style="display: none;">
                        <p>⏳ Загрузка...</p>
                    </div>

                    <div id="results" class="results-section">
                        <p class="empty-state">Выбери ресторан и нажми "Найти комбинации"</p>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
